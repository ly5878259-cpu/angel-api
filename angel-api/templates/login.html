<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<style>
body { background:#000; color:#0f0; font-family:monospace; text-align:center; padding-top:100px;}
input { padding:10px; background:#111; border:1px solid #0f0; color:#0f0;}
button { padding:10px 20px; background:#0f0; border:none; cursor:pointer;}
.box { border:2px solid #0f0; display:inline-block; padding:40px;}
</style>
</head>
<body>
<div class="box">
<h1>Admin Panel</h1>
<form method="post" action="/login">
<input type="password" name="password" placeholder="Password">
<br><br>
<button type="submit">Login</button>
</form>
</div>
</body>
</html>
